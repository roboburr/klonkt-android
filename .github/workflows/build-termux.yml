name: Build Custom Termux APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout klonkt-android
        uses: actions/checkout@v4
        with:
          path: klonkt-android

      # ── Prebaked klonkt-node (node_modules included, built for aarch64 termux) ──
      # Cached on the klonkt-node source zip + prebake script, so the slow QEMU
      # build only reruns when the app source actually changes.
      - name: Restore prebaked klonkt-node
        id: prebake-cache
        uses: actions/cache@v4
        with:
          path: klonkt-node-arm64.tar.gz
          key: klonkt-node-arm64-${{ hashFiles('klonkt-android/app/src/main/assets/klonkt-node.zip', 'klonkt-android/ci/prebake.sh') }}

      - name: Set up QEMU
        if: steps.prebake-cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Prebake klonkt-node (aarch64 Termux)
        if: steps.prebake-cache.outputs.cache-hit != 'true'
        run: |
          unzip -q klonkt-android/app/src/main/assets/klonkt-node.zip -d klonkt-android/klonkt-node-src
          chmod -R 777 klonkt-android
          docker run --rm -v "$PWD/klonkt-android:/repo" termux/termux-docker:aarch64 \
            /data/data/com.termux/files/usr/bin/bash /repo/ci/prebake.sh
          mv klonkt-android/klonkt-node-arm64.tar.gz .
          ls -la klonkt-node-arm64.tar.gz

      # ── Patched Termux APK ──
      - name: Clone Termux
        run: git clone --depth 1 https://github.com/termux/termux-app.git termux-app

      - name: Apply Klonkt Patch
        run: |
          cd termux-app
          git apply ../klonkt-android/termux-patch.diff

      - name: Setup java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APKs
        run: |
          cd termux-app
          ./gradlew assembleDebug

      - name: List build outputs
        run: ls -R termux-app/app/build/outputs/apk || true

      - name: Collect the one universal APK
        run: |
          cp termux-app/app/build/outputs/apk/debug/*universal.apk klonkt.apk
          ls -la klonkt.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klonkt-apk
          path: klonkt.apk
          if-no-files-found: error

      - name: Publish Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "termux-latest"
          prerelease: true
          title: "Klonkt All-in-One (Termux) — Latest"
          files: |
            klonkt.apk
            klonkt-node-arm64.tar.gz
