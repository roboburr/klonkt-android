name: Build Custom Termux APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize runs: two concurrent builds both recreate the termux-latest release,
# and the second one's tag update then fails with "Resource not accessible by
# integration" (seen three times on 2026-07-04). Queue instead of overlap.
concurrency:
  group: termux-apk-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout klonkt-android
        uses: actions/checkout@v4
        with:
          path: klonkt-android

      # ── Prebaked klonkt-node: built from the klonkt STABLE branch (the same
      #    release channel self-hosters run), adapted for Termux (system ffmpeg)
      #    and with node_modules compiled for aarch64. Cached on the stable
      #    commit + the prebake recipe, so the slow QEMU build only reruns when
      #    a new Klonkt release lands or the recipe changes.
      - name: Resolve klonkt stable commit
        id: ksha
        run: echo "sha=$(git ls-remote https://github.com/roboburr/klonkt.git refs/heads/stable | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore prebaked klonkt-node
        id: prebake-cache
        uses: actions/cache@v4
        with:
          path: |
            klonkt-node-arm64.tar.gz
            klonkt-bundle.tar.gz
          key: klonkt-bundle-${{ steps.ksha.outputs.sha }}-${{ hashFiles('klonkt-android/ci/prebake.sh') }}

      - name: Set up QEMU
        if: steps.prebake-cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Prebake klonkt-node (aarch64 Termux, from klonkt@stable)
        if: steps.prebake-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch stable https://github.com/roboburr/klonkt.git klonkt-android/klonkt-node-src
          echo "klonkt source: $(git -C klonkt-android/klonkt-node-src rev-parse HEAD)"
          chmod -R 777 klonkt-android
          docker run --rm -v "$PWD/klonkt-android:/repo" termux/termux-docker:aarch64 \
            /data/data/com.termux/files/usr/bin/bash /repo/ci/prebake.sh
          mv klonkt-android/klonkt-node-arm64.tar.gz klonkt-android/klonkt-bundle.tar.gz .
          ls -la klonkt-node-arm64.tar.gz klonkt-bundle.tar.gz

      # ── Patched Termux APK ──
      - name: Clone Termux
        run: git clone --depth 1 https://github.com/termux/termux-app.git termux-app

      - name: Apply Klonkt Patch
        run: |
          cd termux-app
          git apply ../klonkt-android/termux-patch.diff

      - name: Embed offline bundle in APK assets
        run: |
          mkdir -p termux-app/app/src/main/assets
          cp klonkt-bundle.tar.gz termux-app/app/src/main/assets/
          ls -la termux-app/app/src/main/assets/ | head

      - name: Setup java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APKs
        run: |
          cd termux-app
          ./gradlew assembleDebug

      - name: List build outputs
        run: ls -R termux-app/app/build/outputs/apk || true

      - name: Collect the one universal APK
        run: |
          cp termux-app/app/build/outputs/apk/debug/*universal.apk klonkt.apk
          ls -la klonkt.apk

      - name: Write BUILD-INFO (GPL corresponding-source record)
        run: |
          BUNDLE_VERSION=$(tar -xzOf klonkt-node-arm64.tar.gz klonkt-node/package.json | grep -o '"version": *"[^"]*"' | head -1 | grep -o '[0-9][^"]*')
          {
            echo "klonkt.apk — modified Termux build (GPLv3)"
            echo "bundle-version:   ${BUNDLE_VERSION}"
            echo "built:            $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "termux-app:       https://github.com/termux/termux-app @ $(git -C termux-app rev-parse HEAD)"
            echo "modification:     https://github.com/roboburr/klonkt-android @ ${GITHUB_SHA} (termux-patch.diff)"
            echo "bundled server:   Klonkt (AGPL-3.0-or-later) — https://github.com/roboburr/klonkt @ ${{ steps.ksha.outputs.sha }} (stable)"
            echo "licenses:         see NOTICE.md and LICENSE in the klonkt-android repository"
          } > BUILD-INFO.txt
          cat BUILD-INFO.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klonkt-apk
          path: klonkt.apk
          if-no-files-found: error

      # Move the rolling tag to this commit, then update the release on it.
      # (softprops replaces same-name assets; marvinpinto/action-automatic-releases
      # is archived and its delete-and-recreate approach was flaky.)
      - name: Move the termux-latest tag
        run: |
          git -C klonkt-android tag -f termux-latest
          git -C klonkt-android push -f origin termux-latest

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: termux-latest
          name: "Klonkt All-in-One (Termux) — Latest"
          prerelease: true
          files: |
            klonkt.apk
            klonkt-node-arm64.tar.gz
            BUILD-INFO.txt
