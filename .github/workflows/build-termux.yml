name: Build Custom Termux APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout klonkt-android
        uses: actions/checkout@v4
        with:
          path: klonkt-android
          
      - name: Clone Termux
        run: git clone --depth 1 https://github.com/termux/termux-app.git termux-app
        
      - name: Apply Klonkt Patch
        run: |
          cd termux-app
          git apply ../klonkt-android/termux-patch.diff
          
      - name: Setup java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build APKs
        run: |
          cd termux-app
          ./gradlew assembleDebug

      - name: List build outputs
        run: ls -R termux-app/app/build/outputs/apk || true

      - name: Collect the one universal APK
        run: |
          cp termux-app/app/build/outputs/apk/debug/*universal.apk klonkt.apk
          ls -la klonkt.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klonkt-apk
          path: klonkt.apk
          if-no-files-found: error

      - name: Publish Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "termux-latest"
          prerelease: true
          title: "Klonkt All-in-One (Termux) — Latest"
          files: klonkt.apk
